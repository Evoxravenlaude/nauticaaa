<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#050A12"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#06F5D6"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#06F5D6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06F5D6" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow orb top-right -->
  <ellipse cx="1050" cy="120" rx="300" ry="200" fill="#06F5D6" opacity="0.04" filter="url(#blur)"/>

  <!-- Grid lines -->
  <g opacity="0.04" stroke="white" stroke-width="1">
    <line x1="0"    y1="105" x2="1200" y2="105"/>
    <line x1="0"    y1="210" x2="1200" y2="210"/>
    <line x1="0"    y1="315" x2="1200" y2="315"/>
    <line x1="0"    y1="420" x2="1200" y2="420"/>
    <line x1="0"    y1="525" x2="1200" y2="525"/>
    <line x1="200"  y1="0"   x2="200"  y2="630"/>
    <line x1="400"  y1="0"   x2="400"  y2="630"/>
    <line x1="600"  y1="0"   x2="600"  y2="630"/>
    <line x1="800"  y1="0"   x2="800"  y2="630"/>
    <line x1="1000" y1="0"   x2="1000" y2="630"/>
  </g>

  <!-- Border frame -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- N logo mark -->
  <circle cx="120" cy="120" r="52" fill="#0A1628"/>
  <circle cx="120" cy="120" r="51" fill="none" stroke="url(#cyan)" stroke-width="1.5" opacity="0.5"/>
  <text x="120" y="136" text-anchor="middle" font-family="Arial Black,sans-serif"
    font-weight="900" font-size="52" fill="url(#cyan)">N</text>

  <!-- NAUTICA wordmark -->
  <text x="196" y="110" font-family="Arial Black,sans-serif" font-weight="900"
    font-size="72" letter-spacing="12" fill="white">NAUTICA</text>

  <!-- Tagline -->
  <text x="196" y="148" font-family="'Courier New',monospace" font-size="18"
    letter-spacing="4" fill="rgba(255,255,255,0.45)">PREMIUM WEB3 MARKETPLACE</text>

  <!-- Divider -->
  <line x1="80" y1="200" x2="1120" y2="200" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Feature pills -->
  <g font-family="'Courier New',monospace" font-size="15" font-weight="500">
    <!-- Swap -->
    <rect x="80"  y="240" width="160" height="44" rx="4" fill="rgba(6,245,214,0.08)" stroke="rgba(6,245,214,0.25)" stroke-width="1"/>
    <text x="160" y="268" text-anchor="middle" fill="#06F5D6">⇄  TOKEN SWAP</text>
    <!-- NFT -->
    <rect x="260" y="240" width="160" height="44" rx="4" fill="rgba(6,245,214,0.08)" stroke="rgba(6,245,214,0.25)" stroke-width="1"/>
    <text x="340" y="268" text-anchor="middle" fill="#06F5D6">◈  NFT MARKET</text>
    <!-- Pools -->
    <rect x="440" y="240" width="160" height="44" rx="4" fill="rgba(6,245,214,0.08)" stroke="rgba(6,245,214,0.25)" stroke-width="1"/>
    <text x="520" y="268" text-anchor="middle" fill="#06F5D6">◎  LIQUIDITY</text>
    <!-- ZK -->
    <rect x="620" y="240" width="160" height="44" rx="4" fill="rgba(6,245,214,0.08)" stroke="rgba(6,245,214,0.25)" stroke-width="1"/>
    <text x="700" y="268" text-anchor="middle" fill="#06F5D6">⬡  ZK PRIVATE</text>
  </g>

  <!-- Mock price ticker -->
  <g font-family="'Courier New',monospace" font-size="14">
    <text x="80"  y="360" fill="rgba(255,255,255,0.3)">ETH</text>
    <text x="80"  y="384" fill="white" font-size="22" font-weight="bold">$2,834</text>
    <text x="80"  y="406" fill="#06F5D6" font-size="13">▲ 2.4%</text>

    <text x="240" y="360" fill="rgba(255,255,255,0.3)">BTC</text>
    <text x="240" y="384" fill="white" font-size="22" font-weight="bold">$67,420</text>
    <text x="240" y="406" fill="#06F5D6" font-size="13">▲ 1.1%</text>

    <text x="420" y="360" fill="rgba(255,255,255,0.3)">SOL</text>
    <text x="420" y="384" fill="white" font-size="22" font-weight="bold">$142.80</text>
    <text x="420" y="406" fill="#ef4444" font-size="13">▼ 0.8%</text>
  </g>

  <!-- Mock chart bars (decorative) -->
  <g opacity="0.25">
    <rect x="640" y="390" width="18" height="26"  fill="#06F5D6"/>
    <rect x="664" y="375" width="18" height="41"  fill="#06F5D6"/>
    <rect x="688" y="382" width="18" height="34"  fill="#06F5D6"/>
    <rect x="712" y="358" width="18" height="58"  fill="#06F5D6"/>
    <rect x="736" y="368" width="18" height="48"  fill="#06F5D6"/>
    <rect x="760" y="350" width="18" height="66"  fill="#06F5D6"/>
    <rect x="784" y="362" width="18" height="54"  fill="#06F5D6"/>
    <rect x="808" y="345" width="18" height="71"  fill="#06F5D6" opacity="0.4"/>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="580" width="1200" height="1"  fill="rgba(255,255,255,0.05)"/>

  <!-- Cyan accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#cyan)"/>

  <!-- URL in bottom bar -->
  <text x="80" y="612" font-family="'Courier New',monospace" font-size="14"
    fill="rgba(255,255,255,0.35)">nautica.iamravenlaude.workers.dev</text>

  <!-- Stack badges -->
  <g font-family="'Courier New',monospace" font-size="12" fill="rgba(255,255,255,0.25)">
    <text x="860"  y="612">React + Vite</text>
    <text x="980"  y="612">·</text>
    <text x="992"  y="612">wagmi + viem</text>
  </g>
</svg>
