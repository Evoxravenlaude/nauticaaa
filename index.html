    <style>
      html,body{margin:0;padding:0;background:#04060C}
      #splash{position:fixed;inset:0;background:#04060C;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s ease,visibility .4s ease}
      #splash.hidden{opacity:0;visibility:hidden}
      #splash img{width:72px;height:72px;object-fit:contain;animation:splashPulse 1.8s ease-in-out infinite}
      .splash-wordmark{margin-top:18px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;letter-spacing:.3em;color:rgba(232,240,255,0.4);text-transform:uppercase}
      @keyframes splashPulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
    </style>
    <style>
      :root {
        --sat: env(safe-area-inset-top,    0px);
        --sab: env(safe-area-inset-bottom, 0px);
        --sal: env(safe-area-inset-left,   0px);
        --sar: env(safe-area-inset-right,  0px);
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/logo.png" alt="Nautica" />
      <div class="splash-wordmark">Nautica</div>
    </div>
    <!-- Skip navigation for keyboard/screen reader users -->
    <a href="#main-content"
      style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden"
      onfocus="this.style.cssText='position:fixed;top:0;left:0;z-index:99999;padding:12px 20px;background:#06F5D6;color:#050A12;font-family:monospace;font-size:14px;font-weight:600'"
      onblur="this.style.cssText='position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden'"
    >Skip to content</a>
    <div id="root"></div>
    <script>
      window.__removeSplash = function() {
        var s = document.getElementById('splash');
        if(s){s.classList.add('hidden');setTimeout(function(){s.remove()},450);}
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
